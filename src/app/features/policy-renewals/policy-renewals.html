<div class="page">

  <div class="page__title-wrap">
    <h1 class="page__title">Polisy do wznowienia</h1>
    <div class="page__title-accent"></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-product" (click)="setProductFilter('car')">
      <mat-icon>directions_car</mat-icon>
      Pakiet Auto+
    </button>

    <button class="filter-dropdown">
      <mat-icon class="filter-dropdown__indicator">radio_button_unchecked</mat-icon>
      <span>Numer polisy</span>
      <mat-icon class="filter-dropdown__arrow">keyboard_arrow_down</mat-icon>
    </button>

    <button class="filter-dropdown">
      <mat-icon class="filter-dropdown__indicator">radio_button_unchecked</mat-icon>
      <span>Klient</span>
      <mat-icon class="filter-dropdown__arrow">keyboard_arrow_down</mat-icon>
    </button>

    <button class="filter-dropdown">
      <mat-icon class="filter-dropdown__indicator">radio_button_unchecked</mat-icon>
      <span>Numer rejestracyjny</span>
      <mat-icon class="filter-dropdown__arrow">keyboard_arrow_down</mat-icon>
    </button>

    <button class="filter-search">
      <mat-icon>search</mat-icon>
    </button>

    <button class="filter-reset" (click)="clearFilters()">
      <mat-icon>refresh</mat-icon>
      Zresetuj
    </button>
  </div>

  <div class="results-count">Wyników: {{ service.resultCount() }}</div>

  <!-- Table -->
  <div class="table-wrap">
    <table mat-table [dataSource]="dataSource" matSort class="data-table">

      <!-- Produkt -->
      <ng-container matColumnDef="product">
        <th mat-header-cell *matHeaderCellDef>Produkt</th>
        <td mat-cell *matCellDef="let row">
          <app-product-icon [productType]="row.productType" />
        </td>
      </ng-container>

      <!-- Numer polisy -->
      <ng-container matColumnDef="policyNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Numer polisy</th>
        <td mat-cell *matCellDef="let row">
          <div class="cell-policy">
            <span class="cell-policy__number">{{ row.policyNumber }}</span>
            <mat-icon class="cell-copy" title="Kopiuj">content_copy</mat-icon>
          </div>
        </td>
      </ng-container>

      <!-- Ubezpieczający -->
      <ng-container matColumnDef="insuredName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Ubezpieczający</th>
        <td mat-cell *matCellDef="let row">
          <div class="cell-insured">
            <mat-icon class="cell-insured__icon">account_circle</mat-icon>
            <span>{{ row.insuredName }}</span>
          </div>
        </td>
      </ng-container>

      <!-- Dni do końca -->
      <ng-container matColumnDef="daysToEnd">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Dni do końca</th>
        <td mat-cell *matCellDef="let row">
          <span class="cell-days">{{ row.daysToEnd }}</span>
        </td>
      </ng-container>

      <!-- Identyfikator przedmiotu -->
      <ng-container matColumnDef="identifier">
        <th mat-header-cell *matHeaderCellDef>Identyfikator przedmiotu</th>
        <td mat-cell *matCellDef="let row">
          <div class="cell-identifier">
            <span>{{ row.identifier }}</span>
            <mat-icon class="cell-copy" title="Kopiuj">content_copy</mat-icon>
          </div>
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>
          <mat-icon class="header-grid-icon">grid_view</mat-icon>
        </th>
        <td mat-cell *matCellDef="let row">
          <div class="cell-actions">
            @if (row.hasRenewAction) {
              <button class="renew-btn">
                <mat-icon>refresh</mat-icon>
                Wznów
              </button>
            }
            <button mat-icon-button [matMenuTriggerFor]="rowMenu" class="menu-btn">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #rowMenu="matMenu">
              <button mat-menu-item><mat-icon>visibility</mat-icon>Podgląd</button>
              <button mat-menu-item><mat-icon>refresh</mat-icon>Wznów</button>
              <button mat-menu-item><mat-icon>content_copy</mat-icon>Kopiuj</button>
            </mat-menu>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
