<app-wizard-card [showChips]="true" (nextClick)="next()">
  <h2>Przeznaczenie<br>i przebieg dzienny</h2>

  <p class="field-label">Przeznaczenie pojazdu</p>
  @for (opt of purposes; track opt.value) {
    <div class="radio-option" [class.selected]="purpose === opt.value" (click)="purpose = opt.value">
      <span class="radio-dot"></span>
      <span>{{ opt.label }}</span>
      <span class="info-icon">ⓘ</span>
    </div>
  }

  <p class="field-label" style="margin-top:24px">Ile jeździsz dziennie?</p>
  <p class="subtitle">Ile kilometrów średnio pokonujesz dziennie?</p>

  <div class="km-display">
    <span class="km-main">{{ dailyKm }} <small>km dziennie</small></span>
    <span class="km-arrow">›</span>
    <span class="km-year">{{ yearlyKm | number:'1.0-0' }} <small>km rocznie</small></span>
  </div>

  <input type="range" class="eh-range" [(ngModel)]="dailyKm" min="5" max="200" step="5" [style.--pct]="sliderPct" />

  <div class="range-labels">
    <span>5 km</span>
    <span>200 km</span>
  </div>
</app-wizard-card>
