<app-wizard-card contentBg="cream" [showNext]="false">
  <div class="success-wrap">
    <div class="success-icon">✓</div>
    <h2>Mamy sukces!</h2>
    <p class="subtitle">Twoja polisa została wystawiona. Dokumenty wyślemy na podany adres e-mail.</p>

    <div class="policy-number-box">
      <span class="policy-label">Numer polisy</span>
      <span class="policy-number">{{ policyNumber }}</span>
    </div>

    <div class="action-list">
      <div class="action-item">
        <span class="action-icon">📄</span>
        <span>Pobierz dokumenty polisowe</span>
      </div>
      <div class="action-item">
        <span class="action-icon">🔍</span>
        <span>Sprawdź ubezpieczenie</span>
      </div>
      <div class="action-item">
        <span class="action-icon">👥</span>
        <span>Poleć znajomym ubezpieczenie</span>
      </div>
    </div>

    <button class="btn-primary" (click)="home()">Powrót do strony głównej</button>
  </div>
</app-wizard-card>
