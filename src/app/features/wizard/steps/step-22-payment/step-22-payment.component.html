<app-wizard-card nextLabel="Zapłać" (nextClick)="next()">
  <h2>Opłać polisę</h2>
  <p class="subtitle">Wybierz metodę płatności</p>

  @for (opt of options; track opt.value) {
    <div class="radio-option" [class.selected]="selected === opt.value" (click)="selected = opt.value">
      <span class="radio-dot"></span>
<span>{{ opt.label }}</span>
    </div>
  }
</app-wizard-card>
