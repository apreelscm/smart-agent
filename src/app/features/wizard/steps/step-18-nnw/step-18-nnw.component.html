<app-wizard-card [showChips]="true" [showNext]="false">
  <h2>NNW KiP</h2>
  <p class="subtitle">Zakres ubezpieczenia</p>

  <div class="sum-display">
    <span class="slider-value-display">{{ nnw.sumInsured | number:'1.0-0' }} zł</span>
    <span class="sum-sub">Suma ubezpieczenia / Śmierć kierowcy</span>
  </div>

  <input type="range" class="eh-range" [(ngModel)]="nnw.sumInsured" min="10000" max="200000" step="10000" [style.--pct]="sliderPct" />
  <div class="range-labels"><span>10 000 zł</span><span>200 000 zł</span></div>

  <p class="section-heading" style="margin-top:20px">Zakres ubezpieczenia</p>

  <div class="radio-option" [class.selected]="nnw.mediplan==='podstawowy'" (click)="nnw.mediplan='podstawowy'">
    <span class="radio-dot"></span><span>Mediplan podstawowy</span><span class="info-icon">ⓘ</span>
  </div>
  <div class="radio-option" [class.selected]="nnw.mediplan==='rozszerzony'" (click)="nnw.mediplan='rozszerzony'">
    <span class="radio-dot"></span><span>Mediplan rozszerzony</span><span class="info-icon">ⓘ</span>
  </div>

  <div class="coverage-actions" style="margin-top:16px">
    <button class="btn-cancel" (click)="cancel()">✕</button>
    <div class="price-confirm">{{ price }} zł</div>
    <button class="btn-confirm" (click)="confirm()">✓</button>
  </div>
  <p class="cov-price-label">cena NNW KiP</p>
</app-wizard-card>
