<app-wizard-card [showChips]="true" [showNext]="false">
  <h2>Assistance</h2>
  <p class="subtitle">Zakres terytorialny</p>

  <div class="radio-option" [class.selected]="details.territory==='polska'" (click)="details.territory='polska'">
    <span class="radio-dot"></span><span>Polska</span><span class="info-icon">ⓘ</span>
  </div>
  <div class="radio-option" [class.selected]="details.territory==='europa'" (click)="details.territory='europa'">
    <span class="radio-dot"></span><span>Polska i Europa</span><span class="info-icon">ⓘ</span>
  </div>

  <p class="section-heading" style="margin-top:20px">Zakres ubezpieczenia</p>

  @for (tier of tiers; track tier.value) {
    <div class="tier-card" [class.selected]="details.level===tier.value" (click)="details.level=$any(tier.value)">
      <div class="tier-header">
        <span class="radio-dot"></span>
        <span class="tier-label">{{ tier.label }}</span>
      </div>
      <div class="tier-details">
        <span>Holowanie Polska – {{ tier.holPL }}</span>
        <span>Holowanie Europa – {{ tier.holEU }}</span>
        <span>Pojazd zastępczy – {{ tier.carDays }}</span>
      </div>
    </div>
  }

  <div class="coverage-actions" style="margin-top:16px">
    <button class="btn-cancel" (click)="cancel()">✕</button>
    <div class="price-confirm">{{ price }} zł</div>
    <button class="btn-confirm" (click)="confirm()">✓</button>
  </div>
  <p class="cov-price-label">cena Assistance</p>
</app-wizard-card>
