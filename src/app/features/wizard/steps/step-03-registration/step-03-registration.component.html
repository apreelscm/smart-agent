<app-wizard-card (nextClick)="next()">
  <h2>Podaj numer rejestracyjny</h2>
  <p class="subtitle">Spróbujemy wyszukać go w bazie Centralnej Ewidencji Pojazdów.</p>

  <div class="form-group">
    <label>Numer rejestracyjny</label>
    <input type="text" [(ngModel)]="plateNumber" placeholder="DW000005" style="text-transform:uppercase" />
  </div>

  <p class="skip-link" (click)="skip()">Nie znam numeru rejestracyjnego</p>
</app-wizard-card>
