<app-wizard-card (nextClick)="next()">
  <h2>Jaki rodzaj pojazdu<br>chcesz ubezpieczyć?</h2>

  @for (opt of options; track opt.value) {
    <div class="radio-option" [class.selected]="selected === opt.value" (click)="select(opt.value)">
      <span class="radio-dot"></span>
      <span>{{ opt.label }}</span>
    </div>
  }
</app-wizard-card>
