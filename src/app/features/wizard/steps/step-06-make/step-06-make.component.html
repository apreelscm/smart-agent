<app-wizard-card [showChips]="true" [nextDisabled]="!selected()" (nextClick)="next()">
  <h2>Marka pojazdu</h2>

  <p class="section-heading">Najpopularniejsze</p>
  <div class="make-grid">
    @for (brand of popularBrands(); track brand.name) {
      <div class="radio-option" [class.selected]="selected() === brand.name" (click)="select(brand.name)">
        <span class="radio-dot"></span>
        <span>{{ brand.name }}</span>
      </div>
    }
  </div>

  <div class="form-group" style="margin-top:16px">
    <input type="text" [ngModel]="search()" (ngModelChange)="search.set($event)" placeholder="Wyszukaj markę" />
  </div>

  @for (group of filteredByLetter(); track group[0]) {
    <p class="section-heading">Marki na literę {{ group[0] }}</p>
    @for (name of group[1]; track name) {
      <div class="radio-option" [class.selected]="selected() === name" (click)="select(name)">
        <span class="radio-dot"></span>
        <span>{{ name }}</span>
      </div>
    }
  }
</app-wizard-card>
