<app-wizard-card [showChips]="true" [nextDisabled]="!valid" (nextClick)="next()">
  <h2>Prawo jazdy<br>i kod pocztowy</h2>

  <p class="field-label">Jak długo jeździsz?</p>
  @for (opt of licenseOptions; track opt.value) {
    <div class="radio-option" [class.selected]="licenseYears === opt.value" (click)="licenseYears = opt.value">
      <span class="radio-dot"></span>
      <span>{{ opt.label }}</span>
    </div>
  }

  <p class="field-label" style="margin-top:24px">Gdzie jeździsz?</p>
  <p class="subtitle">Podaj nam swój kod pocztowy, gdzie jeździsz najczęściej.</p>

  <div class="zip-row">
    <div class="form-group" style="flex:1;margin:0">
      <input type="text" [(ngModel)]="zipCode" placeholder="00-000" maxlength="6" />
    </div>
    <button class="btn-secondary">Pobierz lokalizację</button>
  </div>
</app-wizard-card>
