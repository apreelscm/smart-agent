<main class="product-select-page">
  <app-page-header eyebrow="Nowa oferta" title="Wybierz linię produktową" />

  <app-section-card title="Produkty">
    <div class="product-grid">
      @for (tile of productTiles; track tile.key) {
        <a class="product-tile" [routerLink]="tile.route">
          <span class="product-tile__icon"><i [class]="tile.iconClass"></i></span>
          <span class="product-tile__content">
            <strong>{{ tile.title }}</strong>
            <span>{{ tile.subtitle }}</span>
          </span>
          <span class="product-tile__action">Rozpocznij <i class="pi pi-arrow-right"></i></span>
        </a>
      }
    </div>
  </app-section-card>
</main>
