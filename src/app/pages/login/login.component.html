<main class="login-page">
  <section class="login-shell">
    @if (authError()) {
      <div class="login-alert" data-testid="login-error-message" role="alert" aria-live="polite">
        {{ authError() }}
      </div>
    }

    <form
      class="login-form"
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      data-testid="login-form"
      aria-label="Formularz logowania"
      novalidate>
      <div class="form-group">
        <label for="username">Login</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          autocomplete="username"
          placeholder="Wpisz login"
          data-testid="login-username-input"
          [class.field-invalid]="isControlInvalid('username')" />

        @if (isControlInvalid('username')) {
          <p class="field-error">Podaj login.</p>
        }
      </div>

      <div class="form-group">
        <label for="password">Hasło</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Wpisz hasło"
          data-testid="login-password-input"
          [class.field-invalid]="isControlInvalid('password')" />

        @if (isControlInvalid('password')) {
          <p class="field-error">Podaj hasło.</p>
        }
      </div>

      <div class="form-actions">
        <button
          type="submit"
          class="btn-primary login-submit"
          [disabled]="isSubmitting()"
          [class.disabled]="isSubmitting()"
          data-testid="login-submit-button">
          @if (isSubmitting()) {
            Trwa logowanie...
          } @else {
            Zaloguj się
          }
        </button>
      </div>
    </form>
  </section>
</main>
