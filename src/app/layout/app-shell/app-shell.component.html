<div class="app-shell">
  <header class="app-shell__header">
    <div class="brand-block">
      <div class="brand-block__mark">SA</div>
      <div class="brand-block__copy">
        <strong>smart-agent</strong>
        <span>Sprzedaż ubezpieczeń komunikacyjnych</span>
      </div>
    </div>

    <nav class="primary-nav" aria-label="Nawigacja główna">
      @for (item of navigationItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="primary-nav__link--active"
          [routerLinkActiveOptions]="{ exact: item.route === '/offers' }"
          class="primary-nav__link"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="profile-chip">
      <span class="profile-chip__eyebrow">Agent</span>
      <strong>Anna Kowalska</strong>
      <span class="profile-chip__meta">KRK-1204</span>
    </div>
  </header>

  <div class="app-shell__body">
    <router-outlet />
  </div>
</div>
