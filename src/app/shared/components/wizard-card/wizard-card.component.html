<div class="wizard-shell">
  <div
    class="wizard-card"
    [class.wizard-card--header-hidden]="!showHeader"
    [class.wizard-card--hero-hidden]="!showHero"
  >
    @if (showHeader) {
      <div class="card-header">
        <img src="eg_logo.jpg" alt="Ergo Hestia" class="logo-img" />
        <span class="tagline">Proste, bo najważniejsze.</span>
      </div>
    }

    @if (showHero) {
      <div class="hero-wrap">
        <img src="eg_car.png" alt="" class="hero-img" />
        @if (showChips) {
          <app-chip-bar />
        }
      </div>
    }

    <div
      class="card-content"
      [ngClass]="{
        cream: contentBg === 'cream',
        'card-content--header-hidden': !showHeader,
        'card-content--hero-hidden': !showHero,
      }"
    >
      <div class="content-inner">
        <ng-content />
      </div>
    </div>

    @if (showNext) {
      <button
        class="btn-primary"
        [disabled]="nextDisabled"
        [class.disabled]="nextDisabled"
        (click)="nextClick.emit()">
        {{ nextLabel }}
      </button>
    }
  </div>
</div>
