<section class="section-card">
  @if (title() || subtitle()) {
    <header class="section-card__header">
      @if (title()) {
        <h2>{{ title() }}</h2>
      }
      @if (subtitle()) {
        <p>{{ subtitle() }}</p>
      }
    </header>
  }

  <div class="section-card__content">
    <ng-content />
  </div>
</section>
